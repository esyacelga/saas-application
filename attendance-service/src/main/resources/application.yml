server:
  port: 8084

spring:
  application:
    name: attendance-service

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gym_administrator}${DB_SSL_OPTIONS:}
    username: ${DB_USER:gym_user}
    password: ${DB_PASSWORD:gym_pass}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: America/Guayaquil
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS0yNTYtYml0cw==}

services:
  core-service:
    url: ${CORE_SERVICE_URL:http://localhost:8082}
    # REQ-SAAS-001 (Fase 5): secreto del contrato interno service-to-service de core
    # (endpoint clientes-por-vencer). Mismo valor que INTERNAL_SECRET en core/platform.
    internal-secret: ${INTERNAL_SECRET:platform-secret-dev}
  auth-service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}
  platform-service:
    # Fase 6 (R1): endpoint interno de platform (bucket global de aviso previo del socio).
    url: ${PLATFORM_SERVICE_URL:http://localhost:8081}
    internal-secret: ${INTERNAL_SECRET:platform-secret-dev}

scheduling:
  messaging-job-cron: ${MESSAGING_JOB_CRON:0 15 0 * * *}

# REQ-SAAS-001 (Fase 5): WhatsApp del socio (Meta Cloud API, plantillas HSM).
# Si faltan las credenciales el MetaWhatsAppAdapter loguea WARN y no envía (dev/CI).
whatsapp:
  meta:
    api-base-url: ${META_API_BASE_URL:https://graph.facebook.com}
    api-version: ${META_API_VERSION:v21.0}
    phone-number-id: ${META_PHONE_NUMBER_ID:}
    access-token: ${META_ACCESS_TOKEN:}

app:
  cors:
    allow-all: ${CORS_ALLOW_ALL:false}
    allowed-origins:
      - ${CORS_ORIGIN_1:http://localhost:5173}
      - ${CORS_ORIGIN_2:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.gymadmin.attendance: DEBUG
    org.springframework.r2dbc: INFO
