server:
  port: 8085

spring:
  application:
    name: finance-service

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gym-app-saas}${DB_SSL_OPTIONS:}
    username: ${DB_USER:administrador}
    password: ${DB_PASSWORD:seya1922}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: America/Guayaquil
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

jwt:
  secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS0yNTYtYml0cw==}

app:
  cors:
    allow-all: ${CORS_ALLOW_ALL:false}
    allowed-origins:
      - ${CORS_ORIGIN_1:http://localhost:5173}
      - ${CORS_ORIGIN_2:http://localhost:3000}

finance:
  proyeccion-meses-base: ${PROYECCION_MESES_BASE:3}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.gymadmin.finance: DEBUG
