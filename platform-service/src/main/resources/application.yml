server:
  port: 8081

spring:
  application:
    name: platform-service
  # NOTA: platform-service NO usa property-naming-strategy SNAKE_CASE (sus DTOs serializan en
  # camelCase — logoUrl, planActivo, fechaFin — y el frontend admin depende de esos nombres exactos).
  # No añadir SNAKE_CASE aquí sin migrar el contrato JSON. Solo se fija la zona horaria y el formato
  # de fechas para uniformar con el resto de microservicios (2026-07-21).
  jackson:
    time-zone: America/Guayaquil
    serialization:
      write-dates-as-timestamps: false
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gym_administrator}${DB_SSL_OPTIONS:}
    username: ${DB_USER:gym_user}
    password: ${DB_PASSWORD:gym_pass}
  # REQ-SAAS-001 (Sub-fase 1.5): SMTP para notificaciones de vencimiento.
  # Si SMTP_USER queda vacío el EmailAdapter loguea WARN y no falla.
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
jwt:
  secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS0yNTYtYml0cw==}

# REQ-SAAS-001 (Sub-fase 1.4): configuración de llamadas inter-service.
services:
  core:
    url: ${CORE_SERVICE_URL:http://localhost:8083}
  internal:
    secret: ${INTERNAL_SECRET:platform-secret-dev}

qr-token:
  length: ${QR_TOKEN_LENGTH:32}

subscription:
  job:
    cron: ${SUBSCRIPTION_JOB_CRON:0 5 0 * * *}

# REQ-SAAS-001 (Sub-fase 1.5): notificaciones de vencimiento (email + banner).
notificacion:
  vencimiento:
    cron: ${NOTIF_VENCIMIENTO_CRON:0 15 3 * * *}
  email:
    queue:
      fixed-delay-ms: ${NOTIF_EMAIL_QUEUE_DELAY_MS:30000}
      batch-size: ${NOTIF_EMAIL_QUEUE_BATCH:50}
    urls:
      comprar-premium: ${URL_COMPRAR_PREMIUM:https://gymadmin.app/planes}
      gym-admin: ${URL_GYM_ADMIN:https://gymadmin.app}
  whatsapp:
    queue:
      fixed-delay-ms: ${NOTIF_WHATSAPP_QUEUE_DELAY_MS:30000}
      batch-size: ${NOTIF_WHATSAPP_QUEUE_BATCH:50}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-all: ${CORS_ALLOW_ALL:true}

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    mail:
      enabled: false

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    com.gymadmin.platform: DEBUG
