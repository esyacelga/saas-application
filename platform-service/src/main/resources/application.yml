server:
  port: 8081

spring:
  application:
    name: platform-service
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gym_administrator}${DB_SSL_OPTIONS:}
    username: ${DB_USER:gym_user}
    password: ${DB_PASSWORD:gym_pass}
jwt:
  secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS0yNTYtYml0cw==}

qr-token:
  length: ${QR_TOKEN_LENGTH:32}

subscription:
  job:
    cron: ${SUBSCRIPTION_JOB_CRON:0 5 0 * * *}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-all: ${CORS_ALLOW_ALL:true}

management:
  endpoints:
    web:
      exposure:
        include: health

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    com.gymadmin.platform: DEBUG
