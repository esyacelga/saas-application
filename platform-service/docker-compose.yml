services:

  platform-service:
    build: .
    container_name: platform-service
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-gym_administrator}
      DB_USER: ${DB_USER:-gym_user}
      DB_PASSWORD: ${DB_PASSWORD:-gym_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      MODULE_CHECK_CACHE_TTL_SECONDS: ${MODULE_CHECK_CACHE_TTL_SECONDS:-300}
      QR_TOKEN_LENGTH: ${QR_TOKEN_LENGTH:-32}
      SUBSCRIPTION_JOB_CRON: ${SUBSCRIPTION_JOB_CRON:-0 5 0 * * *}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gymadmin-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-gym_administrator}
      POSTGRES_USER: ${DB_USER:-gym_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gym_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gym_user} -d ${DB_NAME:-gym_administrator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gymadmin-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: platform-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gymadmin-net
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  gymadmin-net:
    driver: bridge
