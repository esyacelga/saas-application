spring:
  config:
    import: optional:file:./.env[.properties]

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:gesyacelga@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gym-app-saas}${DB_SSL_OPTIONS:}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    pool:
      enabled: true
      initial-size: 0
      max-size: 20
      max-idle-time: 30m

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never

jwt:
  secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1rZXktbXVzdC1iZS0yNTYtYml0cw==}
  expiry-staff-seconds: ${JWT_EXPIRY_STAFF:28800}
  expiry-cliente-seconds: ${JWT_EXPIRY_CLIENTE:604800}
  refresh-expiry-seconds: ${JWT_REFRESH_EXPIRY:2592000}

app:
  bcrypt-rounds: ${BCRYPT_ROUNDS:12}
  max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
  login-lockout-minutes: ${LOGIN_LOCKOUT_MINUTES:15}
  pwd-reset-token-expiry-hours: ${PWD_RESET_TOKEN_EXPIRY_HOURS:1}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-all: ${CORS_ALLOW_ALL:true}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    io.r2dbc.postgresql.QUERY: DEBUG
    io.r2dbc.postgresql.PARAM: DEBUG
