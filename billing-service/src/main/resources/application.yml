server:
  port: 8086

spring:
  application:
    name: billing-service
  jackson:
    property-naming-strategy: SNAKE_CASE
  task:
    scheduling:
      pool:
        size: 2
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gymadmin}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      initial-size: 2
      max-size: 10
  webflux:
    base-path: /

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
    allow-all: ${CORS_ALLOW_ALL:false}
  email:
    from: ${EMAIL_FROM:noreply@gymadmin.com}
    enabled: ${EMAIL_ENABLED:false}

# SRI electronic invoicing config
sri:
  ambiente: ${SRI_AMBIENTE:1}  # 1=pruebas, 2=produccion
  wsdl:
    recepcion: ${SRI_WSDL_RECEPCION:https://celcer.sri.gob.ec/comprobantes-electronicos-ws/RecepcionComprobantesOffline?wsdl}
    autorizacion: ${SRI_WSDL_AUTORIZACION:https://celcer.sri.gob.ec/comprobantes-electronicos-ws/AutorizacionComprobantesOffline?wsdl}
  storage:
    base-path: ${SRI_STORAGE_PATH:./storage/sri}
  # G2 — Transmisión inmediata: timeout del pipeline síncrono
  # firma → envío → autorización disparado desde POST /facturas.
  # Al vencer, la factura queda en estado ERROR y la fila
  # facturacion.cola_envio se crea con proxima_ejecucion = now()
  # para reintento inmediato del scheduler.
  timeout:
    envio-seconds: ${SRI_TIMEOUT_ENVIO_SECONDS:15}

# P12 certificate decryption key (symmetric, stored in env var)
facturacion:
  cert:
    encryption-key: ${CERT_ENCRYPTION_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    defaults:
      enabled: true

info:
  app:
    name: billing-service
    version: '@project.version@'
    description: Facturación Electrónica SRI Ecuador

platform:
  base-url: ${PLATFORM_SERVICE_URL:http://localhost:8081}

billing:
  gating:
    enabled: ${BILLING_GATING_ENABLED:true}
    modulo-codigo: FACTURACION
    cache-ttl-seconds: ${BILLING_GATING_CACHE_TTL_SECONDS:600}
    cache-max-size: 10000
    webclient:
      connect-timeout-ms: 2000
      read-timeout-ms: 3000

logging:
  level:
    com.gymadmin.billing: DEBUG
