databaseChangeLog:

  # ── G10 · Bancarización sobre USD 500 ────────────────────────────────────────

  - changeSet:
      id: GYM-002-1
      author: gesyacelga
      context: dev, test, prod
      changes:
        - sqlFile:
            path: ddl/01_add_bancarizada_sri_formas_pago.sql
            relativeToChangelogFile: true
            # A diferencia de la baseline, este script lleva dos sentencias
            # (ALTER + UPDATE del seed), así que Liquibase debe separarlas.
            splitStatements: true

  # ── Adelgazar el registro · RUC opcional ─────────────────────────────────────

  - changeSet:
      id: GYM-002-2
      author: gesyacelga
      context: dev, test, prod
      changes:
        - sqlFile:
            path: ddl/02_alter_table_tenant_companias_ruc_nullable.sql
            relativeToChangelogFile: true
            # El script envuelve el ALTER en un bloque DO $$ ... $$ idempotente;
            # es una sola sentencia PL/pgSQL, no hay que separar.
            splitStatements: false
