databaseChangeLog:

  # ── GYM-002 — Fix del COMMENT de identidad.personas.ci_validada ──────────────
  # El baseline GYM-001 decía "pendiente de implementación", pero desde
  # 2026-07-14 el flag se calcula en el INSERT de personas de platform-service.
  # Este changeset actualiza SOLO el metadato del comentario (no toca DDL).

  - changeSet:
      id: GYM-002-1
      author: gesyacelga
      context: dev, test, prod
      comment: 'GYM-002 — Actualiza COMMENT de identidad.personas.ci_validada (lógica ya implementada en platform-service INSERT).'
      changes:
        - sqlFile:
            path: ddl/01_update_comment_identidad_personas_ci_validada.sql
            relativeToChangelogFile: true
            splitStatements: false
      rollback:
        - sqlFile:
            path: ddl/01_update_comment_identidad_personas_ci_validada.rollback.sql
            relativeToChangelogFile: true
            splitStatements: false
