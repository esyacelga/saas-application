            path: dml/02_seed_saas_config_plataforma.sql
            relativeToChangelogFile: true
            splitStatements: false

  - changeSet:
      id: GYM-003-10
      author: gesyacelga
      context: dev, test, prod
      comment: 'REQ-SAAS-001 — Migra tenants existentes: suscripciones vigentes -> LEGACY_GRANDFATHERED; compañías -> trial_usado=TRUE (sección 11.3)'
      changes:
        - sqlFile:
            path: dml/03_migrate_tenants_a_legacy_grandfathered.sql
            relativeToChangelogFile: true
            splitStatements: false

  # ── Sub-fase 1.5 — Notificaciones de vencimiento (cola de emails) ──────────

  - changeSet:
      id: GYM-003-11
      author: gesyacelga
      context: dev, test, prod
      comment: 'REQ-SAAS-001 — Sub-fase 1.5: tenant.notificaciones_suscripcion + proximo_intento + índice parcial para claim FOR UPDATE SKIP LOCKED'
      changes:
